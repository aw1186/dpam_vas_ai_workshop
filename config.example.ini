; Copy this file to config.ini and fill in real credentials.
; config.ini is git-ignored so secrets are never committed.
[fundlink]
username = YOUR_USERNAME
password = YOUR_PASSWORD
dsn = host/service_name

[llm]
api_key = YOUR_OPENAI_COMPATIBLE_KEY
base_url = https://your-llm-host/v1
model = gpt-4.1-mini
; For internal hosts with a private CA, either set ca_bundle to the CA .pem
; (recommended) or set verify = false (disables TLS verification).
; ca_bundle = C:\path\to\corporate-ca.pem
; verify = false
